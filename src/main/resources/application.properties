# ============================================
# CicloCare API - Application Configuration
# ============================================

# Server
server.port=8082
server.servlet.context-path=/api

# Application
spring.application.name=ciclocare-api

# ============================================
# DATABASE CONFIGURATION
# ============================================
spring.datasource.url=jdbc:postgresql://localhost:5432/ciclocare_db
spring.datasource.username=postgres
spring.datasource.password=1346798
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA/Hibernate
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.jdbc.batch_size=20
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true

# ============================================
# JWT CONFIGURATION
# ============================================
jwt.secret.key=your_secret_key_change_in_production_minimum_256_bits_long_for_security
jwt.expiration=86400000
jwt.refresh.expiration=604800000

# ============================================
# CORS CONFIGURATION
# ============================================
cors.allowed-origins=http://localhost:3000,http://localhost:5173,http://127.0.0.1:5500
cors.allowed-methods=GET,POST,PUT,DELETE,OPTIONS
cors.allowed-headers=*
cors.allow-credentials=true

# ============================================
# LOGGING
# ============================================
logging.level.root=INFO
logging.level.com.ciclocare=DEBUG
logging.level.org.springframework.security=DEBUG

# ============================================
# JACKSON
# ============================================
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.time-zone=America/Sao_Paulo
